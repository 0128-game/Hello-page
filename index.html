<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おかえりなさい！</title>
    <style>
        /* 全体のリセットと背景グラデーション */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* メインコンテナのアニメーション（ふわっと浮き上がる） */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 2.5rem;
        }

        /* ボタンのレイアウト */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 280px;
            margin: 0 auto;
        }

        /* ボタンの基本スタイルとアニメーション */
        .btn {
            display: block;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* ホバー時の演出（ネオンのように光る） */
        .btn:hover {
            background: #ffffff;
            color: #1e1b4b;
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2), 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* クリックした時のカチッとした演出 */
        .btn:active {
            transform: translateY(-1px);
            box-shadow: 0 5px 10px rgba(255, 255, 255, 0.2);
        }

        /* その他（タブを閉じる）ボタンの特殊カラー */
        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }
        .btn-danger:hover {
            background: #ef4444;
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4);
        }

        /* アニメーションのキーフレーム定義 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>おかえりなさい！</h1>
        <p>今日の要件は？</p>

        <div class="button-group">
            <a href="https://example.com/novel" class="btn">小説執筆</a>
            <a href="https://www.youtube.com" class="btn">ようつべ</a>
            <a href="https://example.com/25ji" class="btn">ニーゴ</a>
            
            <button onclick="openAndClose()" class="btn btn-danger">その他 ⇛</button>
        </div>
    </div>

    <script>
        function openAndClose() {
            // 1. 新しいタブで開きたいURL（例としてGoogle）
            window.open('https://www.google.com', '_blank');
            
            // 2. 自分自身のタブを閉じる
            window.close();
        }
    </script>

</body>
</html>
